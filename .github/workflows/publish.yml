name: Publish to pub.dev

on:
  push:
    tags:
      - 'v*'

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Dart
        uses: dart-lang/setup-dart@v1

      - name: Configure pub credentials
        run: |
          mkdir -p ~/.config/dart
          printf '%s' "${{ secrets.PUB_CREDENTIALS_JSON }}" > ~/.config/dart/pub-credentials.json
          printf '%s' "${{ secrets.PUB_TOKEN_JSON }}" > ~/.config/dart/token.json
          chmod 600 ~/.config/dart/pub-credentials.json ~/.config/dart/token.json

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Dry run
        run: dart pub publish --dry-run

      - name: Publish
        run: dart pub publish -f
